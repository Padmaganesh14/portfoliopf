<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <defs>
    <linearGradient id="certGradient4" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a3e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#16213e;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="800" height="600" fill="url(#certGradient4)"/>
  
  <!-- Decorative Border -->
  <rect x="30" y="30" width="740" height="540" fill="none" stroke="#c70039" stroke-width="4" rx="20"/>
  <rect x="40" y="40" width="720" height="520" fill="none" stroke="#c70039" stroke-width="1" rx="15" opacity="0.5"/>
  
  <!-- Code Icon -->
  <text x="400" y="100" font-family="Arial, sans-serif" font-size="60" text-anchor="middle" fill="#c70039">⚡</text>
  
  <!-- Header -->
  <text x="400" y="170" font-family="Georgia, serif" font-size="44" font-weight="bold" fill="#c70039" text-anchor="middle">
    CERTIFICATE
  </text>
  
  <!-- Title -->
  <text x="400" y="230" font-family="Georgia, serif" font-size="32" font-weight="bold" fill="#ffffff" text-anchor="middle">
    Advanced C++ Training
  </text>
  <text x="400" y="265" font-family="Georgia, serif" font-size="32" font-weight="bold" fill="#ffffff" text-anchor="middle">
    Program
  </text>
  
  <!-- Issuer -->
  <text x="400" y="320" font-family="Arial, sans-serif" font-size="18" fill="#d0d0d0" text-anchor="middle">
    IIT Bombay Spoken Tutorial
  </text>
  <text x="400" y="345" font-family="Arial, sans-serif" font-size="14" fill="#a0a0a0" text-anchor="middle">
    EduPyramids, SINE
  </text>
  
  <!-- Content -->
  <text x="400" y="410" font-family="Arial, sans-serif" font-size="15" fill="#d0d0d0" text-anchor="middle">
    Successfully completed advanced training in
  </text>
  <text x="400" y="435" font-family="Arial, sans-serif" font-size="15" fill="#d0d0d0" text-anchor="middle">
    Object-Oriented Programming, STL, and Modern C++ Practices
  </text>
  
  <!-- Year -->
  <text x="400" y="490" font-family="Arial, sans-serif" font-size="18" fill="#c70039" text-anchor="middle" font-weight="bold">
    April 2025
  </text>
  
  <!-- Decorative elements -->
  <circle cx="100" cy="100" r="30" fill="none" stroke="#c70039" stroke-width="2" opacity="0.3"/>
  <circle cx="700" cy="500" r="35" fill="none" stroke="#c70039" stroke-width="2" opacity="0.3"/>
