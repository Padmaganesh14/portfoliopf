<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <defs>
    <linearGradient id="certGradient2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d3c3d;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a6b6b;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="800" height="600" fill="url(#certGradient2)"/>
  
  <!-- Decorative Border -->
  <rect x="30" y="30" width="740" height="540" fill="none" stroke="#00d99f" stroke-width="4" rx="20"/>
  <rect x="40" y="40" width="720" height="520" fill="none" stroke="#00d99f" stroke-width="1" rx="15" opacity="0.5"/>
  
  <!-- Badge -->
  <circle cx="400" cy="100" r="45" fill="#00d99f" opacity="0.2" stroke="#00d99f" stroke-width="2"/>
  <text x="400" y="110" font-family="Arial, sans-serif" font-size="50" text-anchor="middle" fill="#00d99f">🗄️</text>
  
  <!-- Header -->
  <text x="400" y="170" font-family="Georgia, serif" font-size="44" font-weight="bold" fill="#00d99f" text-anchor="middle">
    CERTIFICATE
  </text>
  
  <!-- Title -->
  <text x="400" y="230" font-family="Georgia, serif" font-size="28" font-weight="bold" fill="#ffffff" text-anchor="middle">
    RDBMS PostgreSQL
  </text>
  <text x="400" y="265" font-family="Georgia, serif" font-size="28" font-weight="bold" fill="#ffffff" text-anchor="middle">
    Training Program
  </text>
  
  <!-- Issuer -->
  <text x="400" y="320" font-family="Arial, sans-serif" font-size="16" fill="#d0d0d0" text-anchor="middle">
    Awarded by: EduPyramids, SINE, IIT Bombay
  </text>
  
  <!-- Score -->
  <text x="400" y="375" font-family="Arial, sans-serif" font-size="20" font-weight="bold" fill="#00d99f" text-anchor="middle">
    Score: 92.5%
  </text>
  
  <!-- Year -->
  <text x="400" y="420" font-family="Arial, sans-serif" font-size="18" fill="#a0a0a0" text-anchor="middle">
    Year: 2026
  </text>
  
  <!-- Description -->
  <text x="400" y="480" font-family="Arial, sans-serif" font-size="12" fill="#a0a0a0" text-anchor="middle">
    Successfully completed comprehensive training in
  </text>
  <text x="400" y="500" font-family="Arial, sans-serif" font-size="12" fill="#a0a0a0" text-anchor="middle">
    Relational Database Management Systems and PostgreSQL
  </text>
  
  <!-- Decorative corners -->
  <circle cx="80" cy="80" r="25" fill="none" stroke="#00d99f" stroke-width="2" opacity="0.3"/>
  <circle cx="720" cy="520" r="35" fill="none" stroke="#00d99f" stroke-width="2" opacity="0.3"/>
</svg>