<svg viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <defs>
    <linearGradient id="certGradient1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3c72;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2a5298;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="800" height="600" fill="url(#certGradient1)"/>
  
  <!-- Decorative Border -->
  <rect x="30" y="30" width="740" height="540" fill="none" stroke="#ffd700" stroke-width="4" rx="20"/>
  <rect x="40" y="40" width="720" height="520" fill="none" stroke="#ffd700" stroke-width="1" rx="15" opacity="0.5"/>
  
  <!-- Header -->
  <text x="400" y="80" font-family="Georgia, serif" font-size="48" font-weight="bold" fill="#ffd700" text-anchor="middle">
    CERTIFICATE OF COMPLETION
  </text>
  
  <!-- Issuer -->
  <text x="400" y="130" font-family="Arial, sans-serif" font-size="24" fill="#ffffff" text-anchor="middle" opacity="0.9">
    Deloitte
  </text>
  <text x="400" y="160" font-family="Arial, sans-serif" font-size="16" fill="#e0e0e0" text-anchor="middle">
    Forage
  </text>
  
  <!-- Title -->
  <text x="400" y="220" font-family="Georgia, serif" font-size="32" font-weight="bold" fill="#ffffff" text-anchor="middle">
    Data Analytics
  </text>
  <text x="400" y="255" font-family="Georgia, serif" font-size="32" font-weight="bold" fill="#ffffff" text-anchor="middle">
    Job Simulation
  </text>
  
  <!-- Description -->
  <text x="400" y="310" font-family="Arial, sans-serif" font-size="14" fill="#d0d0d0" text-anchor="middle">
    This certifies that the bearer has successfully completed
  </text>
  <text x="400" y="335" font-family="Arial, sans-serif" font-size="14" fill="#d0d0d0" text-anchor="middle">
    the Deloitte Data Analytics Job Simulation
  </text>
  
  <!-- Year -->
  <text x="400" y="400" font-family="Arial, sans-serif" font-size="18" fill="#ffd700" text-anchor="middle" font-weight="bold">
    2026
  </text>
  
  <!-- Footer -->
  <text x="400" y="500" font-family="Arial, sans-serif" font-size="12" fill="#a0a0a0" text-anchor="middle">
    Completed: Data Analysis, Reporting, and Interpretation
  </text>
  
  <!-- Decorative elements -->
  <circle cx="100" cy="100" r="30" fill="none" stroke="#ffd700" stroke-width="2" opacity="0.3"/>
  <circle cx="700" cy="500" r="40" fill="none" stroke="#ffd700" stroke-width="2" opacity="0.3"/>
</svg>